[package]
name = "mexc_bypass"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", features = ["json", "gzip", "brotli", "deflate", "rustls-tls", "socks"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
md5 = "0.7"
futures = "0.3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true